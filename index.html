<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#08101f" />
  <title>方块世界</title>
</head>
<body>
  <div id="container">
    <canvas id="c"></canvas>
    <div id="crosshair"></div>

    <div id="hud-top">
      <div id="hud-left">
        <div id="title-chip">🧊 方块世界</div>
        <div id="debugText">加载中...</div>
      </div>
      <div id="hud-tools">
        <button id="inventoryBtn" class="tool-btn" type="button" aria-label="打开物品栏">🎒</button>
        <button id="saveBtn" class="tool-btn" type="button" aria-label="保存世界">💾</button>
        <button id="randomBtn" class="tool-btn" type="button" aria-label="随机刷新世界">🎲</button>
        <button id="timeBtn" class="tool-btn" type="button" aria-label="调整昼夜速度">⏱️</button>
        <button id="weatherBtn" class="tool-btn" type="button" aria-label="切换天气">🌦️</button>
        <button id="renderBtn" class="tool-btn" type="button" aria-label="调整视野">👁️</button>
        <button id="resetBtn" class="tool-btn" type="button" aria-label="回到出生点">🏠</button>
      </div>
    </div>

    <div id="center-toast"></div>

    <div id="inventory-panel" class="hidden">
      <div id="inventory-card">
        <div id="inventory-head">
          <div>
            <h2>物品栏</h2>
            <p>点选任意方块加入当前手持</p>
          </div>
          <button id="closeInventoryBtn" type="button" aria-label="关闭物品栏">×</button>
        </div>
        <div id="inventory-tabs"></div>
        <div id="inventory-grid"></div>
      </div>
    </div>

    <div id="hotbar" aria-label="方块快捷栏"></div>

    <div id="joystick-base"><div id="joystick-knob"></div></div>

    <div id="action-buttons">
      <button id="mineBtn" class="action-btn" type="button" aria-label="挖掘">⛏️</button>
      <button id="placeBtn" class="action-btn" type="button" aria-label="放置">🧱</button>
      <button id="jumpBtn" class="action-btn" type="button" aria-label="跳跃">⤴️</button>
    </div>

    <div id="info-overlay">
      <h1>🧊 方块世界 3.0</h1>
      <p>更大的随机地图、河流合流、雪地、雨雪、动植物、物品栏、昼夜速度和自动保存。</p>
      <p>手机端：拖动屏幕看四周，左下摇杆移动，右下挖掘 / 放置 / 跳跃。</p>
      <p class="desktop-tip">电脑端：WASD 移动，Shift 加速，空格跳跃，鼠标拖动视角，数字键切方块，左键挖，右键放。</p>
      <button id="startBtn" type="button">开始游戏</button>
    </div>
  </div>

  <script>
    window.__blockWorldEngineGuard = (() => {
      const canvas = document.getElementById('c');
      const overlay = document.getElementById('info-overlay');
      const debugText = document.getElementById('debugText');
      const startBtn = document.getElementById('startBtn');
      let failed = false;

      function formatError(error) {
        if (!error) return '';
        if (error instanceof Error) return `${error.name}: ${error.message}`;
        return String(error);
      }

      function paintFallbackOverlay(message, detail = '') {
        failed = true;
        if (debugText) debugText.textContent = `${message}${detail ? `\n${detail}` : ''}`;
        if (!overlay) return;
        overlay.style.display = 'flex';
        overlay.style.pointerEvents = 'auto';
        overlay.innerHTML = `
          <h1>⚠️ 3D 引擎启动失败</h1>
          <p>${message}</p>
          <p class="desktop-tip">${detail || '建议使用 Safari / Chrome，关闭低电量模式、隐私拦截或浏览器实验限制后重试。'}</p>
          <button id="reloadBtn" type="button">重新加载</button>
        `;
        const reloadBtn = document.getElementById('reloadBtn');
        if (reloadBtn) reloadBtn.addEventListener('click', () => window.location.reload());
      }

      function canCreateWebGLContext() {
        try {
          if (!window.WebGLRenderingContext) return false;
          const testCanvas = document.createElement('canvas');
          const context = testCanvas.getContext('webgl2', { failIfMajorPerformanceCaveat: false })
            || testCanvas.getContext('webgl', { failIfMajorPerformanceCaveat: false })
            || testCanvas.getContext('experimental-webgl', { failIfMajorPerformanceCaveat: false });
          return !!context;
        } catch (error) {
          paintFallbackOverlay('当前浏览器创建 WebGL 上下文失败。', formatError(error));
          return false;
        }
      }

      function bootAllowed() {
        const width = window.innerWidth || document.documentElement.clientWidth || 0;
        const height = window.innerHeight || document.documentElement.clientHeight || 0;
        if (!canvas) {
          paintFallbackOverlay('没有找到游戏画布，页面结构可能加载不完整。');
          return false;
        }
        if (width <= 0 || height <= 0) {
          paintFallbackOverlay('浏览器窗口尺寸异常，无法初始化 WebGL。');
          return false;
        }
        if (!canCreateWebGLContext()) {
          paintFallbackOverlay('当前浏览器或设备不支持 WebGL，无法启动方块世界。');
          return false;
        }
        return true;
      }

      if (canvas) {
        canvas.addEventListener('webglcontextlost', (event) => {
          event.preventDefault();
          paintFallbackOverlay('WebGL 上下文已丢失，游戏已暂停。', '这通常由系统内存不足、切后台或浏览器回收 GPU 资源导致。请点重新加载恢复。');
        }, false);
        canvas.addEventListener('webglcontextrestored', () => {
          if (failed) window.location.reload();
        }, false);
      }

      window.addEventListener('error', (event) => {
        if (failed) return;
        const message = event?.message || '未知脚本错误';
        const source = event?.filename || '';
        if (source.includes('/src/v3.js') || message.includes('WebGL') || message.includes('THREE')) {
          paintFallbackOverlay('游戏脚本初始化失败，已阻止黑屏。', `${message}${source ? ` @ ${source}` : ''}`);
        }
      });

      window.addEventListener('unhandledrejection', (event) => {
        if (failed) return;
        paintFallbackOverlay('游戏模块加载失败，已阻止黑屏。', formatError(event?.reason));
      });

      if (startBtn) startBtn.disabled = false;
      return { bootAllowed, showFailure: paintFallbackOverlay, get failed() { return failed; } };
    })();
  </script>
  <script type="module">
    const guard = window.__blockWorldEngineGuard;
    if (guard?.bootAllowed()) {
      import('./src/v3.js')
        .then(() => Promise.all([
          import('./src/survival-loop.js'),
          import('./src/survival-hold-guard.js'),
          import('./src/survival-inventory-label-fix.js'),
          import('./src/mobile-ui-rescue.js'),
        ]).catch((error) => console.warn('Survival/mobile helpers failed to load:', error)))
        .catch((error) => {
          guard.showFailure('Three.js / Vite 模块加载失败，已阻止黑屏。', error instanceof Error ? `${error.name}: ${error.message}` : String(error));
        });
    }
  </script>
</body>
</html>
